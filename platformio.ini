; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = https://github.com/platformio/platform-espressif32.git

;platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
framework = arduino
board_build.flash_size = 16MB
; *** FIX CHIAVE: il board e' definito 8MB; senza questa riga il bootloader
; viene scritto come 8MB e rifiuta le partizioni oltre 8MB -> boot loop. ***
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_mode = qio
monitor_speed = 115200
board_build.psram = enabled
; N16R8 = PSRAM OCTAL (OPI): serve per attivarla davvero.
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs
build_flags =
	-D PIO_FRAMEWORK_ARDUINO_SPIFFS_ENABLE
	-D PIO_FRAMEWORK_ARDUINO_LITTLEFS_ENABLE
	-D BOARD_HAS_PSRAM

lib_deps =
	adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
	adafruit/Adafruit GFX Library @ ^1.11.11
	adafruit/Adafruit BusIO @ ^1.16.1
	adafruit/Adafruit NeoPixel @ ^1.12.3
	baldram/ESP_VS1053_Library @ ^1.1.4
	bblanchon/ArduinoJson @ ^7.2.1
	ruiseixasm/Versatile_RotaryEncoder @ ^1.3.1
	; TFLite Micro (wake word "Alexo", vedi WAKEWORD.md). Port Arduino con TFLM
	; attuale (v2.0.0, lug 2024). Usato solo se TFL_SELFTEST/WAKE_ENABLE compilano
	; codice che lo include; col default (0) non viene tirato dentro.
	https://github.com/spaziochirale/Chirale_TensorFlowLite.git

; --- UPLOAD ---
; USB: serve UNA volta per caricare il firmware con l'OTA abilitato.
; Dopo, per flashare via WiFi: commenta le 2 righe USB e decommenta le 2 OTA.
;upload_port = COMx        ; la porta seriale della tua board (es. COM3, /dev/ttyUSB0)
;upload_protocol = esptool
; --- OTA via WiFi (hostname mDNS, robusto al DHCP) ---
upload_port = alexo.local
upload_protocol = espota
